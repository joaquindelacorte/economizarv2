<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GSQ99MXP6F"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GSQ99MXP6F');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística de Granos | Control Panel</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7056671058245686"
     crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #1e293b;
            --soja: #22c55e;
            --trigo: #eab308;
            --maiz: #f97316;
            --accent: #3b82f6;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            color: var(--primary);
        }

        .dashboard {
            width: 95%;
            max-width: 1200px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .title-group h1 { 
            margin: 0; 
            font-size: 28px; 
            letter-spacing: -0.025em;
            font-weight: 800;
        }

        .title-group p { 
            margin: 5px 0 0 0; 
            color: #64748b; 
            font-size: 14px;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .online { background: #dcfce7; color: #166534; }
        .online::before { background: #22c55e; }
        
        .offline { background: #fee2e2; color: #991b1b; }
        .offline::before { background: #ef4444; }
        
        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
            margin-bottom: 30px;
        }

        .btn-update {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-update:hover {
            background: #334155;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-update:active { transform: translateY(0); }

        /* Estilo para los tooltips */
        .chart-tooltip {
            background: rgba(30, 41, 59, 0.9) !important;
            border-radius: 8px !important;
            padding: 12px !important;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="title-group">
            <h1>Camiones en puerto</h1>
            <p>Monitoreo en tiempo real de ingreso de granos por terminal</p>
        </div>
        <div id="status" class="status-badge offline">SISTEMA OFFLINE</div>
    </header>

    <div class="chart-wrapper">
        <canvas id="mainChart"></canvas>
    </div>

    <div style="display: flex; justify-content: flex-end;">
        <button class="btn-update" onclick="updateData()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
            Actualizar Datos
        </button>
    </div>
</div>

<script>
    const N8N_URL = 'https://primary-production-110d9.up.railway.app/webhook/8d5486b1-c268-4970-b0a4-7f9a8f2499e4'; 
    
    // Registrar el plugin de etiquetas
    Chart.register(ChartDataLabels);

    let myChart;
    const statusBadge = document.getElementById('status');

    // Función para limpiar fechas (quita la parte T00:00:00...)
    const formatLabel = (dateStr) => {
        if(!dateStr) return '';
        return dateStr.split('T')[0];
    };

    async function updateData() {
        try {
            const response = await fetch(N8N_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) throw new Error('Error en n8n');
            
            const data = await response.json();
            renderChart(data);
            
            statusBadge.innerText = 'SISTEMA ONLINE';
            statusBadge.className = 'status-badge online';
        } catch (err) {
            console.error(err);
            statusBadge.innerText = 'ERROR DE ENLACE';
            statusBadge.className = 'status-badge offline';
            loadDummyData();
        }
    }

    function renderChart(items) {
        const ctx = document.getElementById('mainChart').getContext('2d');

        const labels = items.map(i => formatLabel(i.fecha));
        const soja  = items.map(i => i.camiones_so_ja || i.camiones_soja || 0);
        const trigo = items.map(i => i.camiones_trigo || 0);
        const maiz  = items.map(i => i.camiones_maiz  || 0);
        const total = items.map((_, idx) => soja[idx] + trigo[idx] + maiz[idx]);

        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Soja',
                        type: 'bar',
                        data: soja,
                        backgroundColor: '#22c55e',
                        borderRadius: 5,
                        borderSkipped: false,
                        yAxisID: 'y'
                    },
                    {
                        label: 'Trigo',
                        type: 'bar',
                        data: trigo,
                        backgroundColor: '#eab308',
                        borderRadius: 5,
                        borderSkipped: false,
                        yAxisID: 'y'
                    },
                    {
                        label: 'Maíz',
                        type: 'bar',
                        data: maiz,
                        backgroundColor: '#f97316',
                        borderRadius: 5,
                        borderSkipped: false,
                        yAxisID: 'y'
                    },
                    {
                        label: 'Total',
                        type: 'line',
                        data: total,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59,130,246,0.08)',
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        borderWidth: 2.5,
                        tension: 0.35,
                        fill: false,
                        yAxisID: 'y',
                        order: 0,
                        datalabels: { display: false }
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                layout: { padding: { top: 16 } },
                scales: {
                    x: {
                        stacked: false,
                        grid: { display: false },
                        ticks: { color: '#64748b', font: { size: 11, weight: '600' } }
                    },
                    y: {
                        stacked: false,
                        beginAtZero: true,
                        grid: { color: '#f1f5f9' },
                        ticks: {
                            color: '#64748b',
                            callback: v => v.toLocaleString('es-AR')
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        align: 'end',
                        labels: {
                            usePointStyle: true,
                            pointStyle: 'circle',
                            padding: 20,
                            font: { size: 12, weight: '600' }
                        }
                    },
                    datalabels: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            label: ctx => `${ctx.dataset.label}: ${Number(ctx.raw).toLocaleString('es-AR')} camiones`
                        }
                    }
                }
            }
        });
    }

    function loadDummyData() {
        const dummy = [
            { fecha: '2026-04-05', camiones_soja: 231, camiones_trigo: 100, camiones_maiz: 944 },
            { fecha: '2026-04-06', camiones_soja: 155, camiones_trigo: 281, camiones_maiz: 1182 },
            { fecha: '2026-04-07', camiones_soja: 213, camiones_trigo: 299, camiones_maiz: 1963 },
            { fecha: '2026-04-08', camiones_soja: 282, camiones_trigo: 352, camiones_maiz: 2360 }
        ];
        renderChart(dummy);
    }

    updateData();
</script>

</body>
</html>
