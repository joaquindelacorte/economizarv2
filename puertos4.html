<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GSQ99MXP6F"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GSQ99MXP6F');
    </script>
    <meta charset="UTF-8">
    <title>Port Control Tower | Dashboard</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7056671058245686"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-body: #f1f5f9;
            --panel-bg: #ffffff;
            --primary: #0f172a; 
            --accent: #3b82f6; 
            --success: #10b981; 
            --danger: #ef4444; 
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        
        body { margin: 0; display: grid; grid-template-columns: 420px 1fr; height: 100vh; font-family: 'Inter', system-ui, sans-serif; background: var(--bg-body); color: var(--text-main); }
        
        /* Sidebar */
        #sidebar { background: var(--panel-bg); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 10px 0 15px rgba(0,0,0,0.02); }
        
        .header { padding: 25px 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: flex-start; }
        .header h2 { margin: 0; font-size: 1.1rem; font-weight: 700; letter-spacing: -0.025em; }
        
        /* Status Indicator */
        .db-status { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
        .dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        .dot.offline { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Summary Cards */
        .summary-panel { padding: 20px; border-bottom: 1px solid #f1f5f9; background: #fff; }
        .main-stat { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; }
        .main-stat small { font-size: 11px; text-transform: uppercase; opacity: 0.7; font-weight: 700; }
        .main-stat div { font-size: 2.2rem; font-weight: 800; }

        .crop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .crop-item { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #edf2f7; }
        .crop-item span { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .crop-item b { font-size: 16px; color: var(--primary); }

        /* Ranking */
        .ranking-container { flex-grow: 1; overflow-y: auto; }
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th { text-align: left; padding: 12px 20px; font-size: 11px; text-transform: uppercase; color: var(--text-muted); background: #f8fafc; border-bottom: 1px solid #edf2f7; position: sticky; top: 0; z-index: 10; }
        .ranking-table td { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .ranking-table tr:hover td { background: #f0f7ff; color: var(--accent); }

        .badge { padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 10px; }
        .up { background: #dcfce7; color: #15803d; }
        .down { background: #fee2e2; color: #b91c1c; }

        /* Right Panel */
        #main-view { display: flex; flex-direction: column; }
        #map { flex-grow: 1; filter: grayscale(0.2); }
        #chart-area { height: 260px; background: #fff; border-top: 1px solid #e2e8f0; padding: 20px; }
        
        /* Popup Detalle de Cultivo */
        .popup-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: #f8fafc; padding: 8px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 12px; color: #475569; margin-top: 8px; }
        .popup-detail-grid div { display: flex; justify-content: space-between; }
        .popup-detail-grid b { color: #0f172a; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <div>
            <h2>PORT LOGISTICS</h2>
            <div id="last-update" style="font-size: 10px; margin-top: 4px; opacity: 0.6;">Sincronizando...</div>
        </div>
        <div class="db-status">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">Buscando</span>
        </div>
    </div>

    <div class="summary-panel">
        <div class="main-stat">
            <small>Total Camiones (Todos los puertos)</small>
            <div id="total-gen">0</div>
        </div>
        <div class="crop-grid">
            <div class="crop-item" style="border-left: 4px solid #fbbf24;"><span>🌽 Maíz</span><b id="sum-maiz">0</b></div>
            <div class="crop-item" style="border-left: 4px solid #34d399;"><span>🌱 Soja</span><b id="sum-soja">0</b></div>
            <div class="crop-item" style="border-left: 4px solid #8b5cf6;"><span>🌾 Trigo</span><b id="sum-trigo">0</b></div>
            <div class="crop-item" style="border-left: 4px solid #f472b6;"><span>🌻 Girasol</span><b id="sum-girasol">0</b></div>
        </div>
    </div>

    <div class="ranking-container">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Terminal</th>
                    <th style="text-align:right">Hoy</th>
                    <th style="text-align:center">Var%</th>
                </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
        </table>
    </div>
</div>

<div id="main-view">
    <div id="map"></div>
    <div id="chart-area">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const GPS = {
        "ACA - SAN LORENZO": [-32.7335, -60.7301], "ACA - TIMBUES": [-32.6661, -60.7315],
        "ACEITERA CHABAS": [-33.3285, -61.1685], "ADM AGRO S.R.L. - ARROYO SECO": [-33.1558, -60.4852],
        "ADM AGRO S.R.L. - PTO GRAL SAN MARTIN": [-32.7165, -60.7310], "AGD TIMBUES": [-32.6742, -60.7268],
        "BARADERO": [-33.8058, -59.5052], "BUNGE - PGSM": [-32.7231, -60.7305],
        "BUNGE - RAMALLO": [-33.4795, -60.0125], "CARGILL - ALVEAR": [-33.0561, -60.5985],
        "CARGILL QUEBRACHO - PGSM": [-32.7042, -60.7338], "COFCO - LIMA": [-33.9782, -59.1895],
        "COFCO - PGSM": [-32.7305, -60.7288], "COFCO - TIMBUES": [-32.6595, -60.7345],
        "DREYFUS - GRAL. LAGOS": [-33.1095, -60.5285], "DREYFUS - TIMBUES": [-32.6510, -60.7380],
        "FCA. VICENTIN": [-32.7652, -60.7610], "MOLINO CHABAS SA": [-33.3285, -61.1685],
        "MOLINOS AGRO - SAN LORENZO": [-32.7485, -60.7255], "RENOVA S.A.": [-32.6850, -60.7225],
        "SEMINO MOLINOS": [-32.8550, -61.1455], "SERV. PORT. (VILLA C.)": [-33.2265, -60.3245],
        "TERMINAL 6": [-32.6955, -60.7325], "TERMINAL PUERTO SAN PEDRO": [-33.6745, -59.6610],
        "U6 - SERVICIOS PORTUARIOS S.A.": [-32.9690, -60.6255]
    };

    let map = L.map('map', { zoomControl: false }).setView([-32.90, -60.60], 9);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    
    let myChart;

    async function fetchData() {
        const dot = document.getElementById('status-dot');
        const stText = document.getElementById('status-text');
        const WEBHOOK = 'https://primary-production-110d9.up.railway.app/webhook/ba8cbdca-5db1-47fb-9ad0-bec7b195ecdf';

        try {
            const res = await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "monitor" })
            });
            const data = await res.json();
            
            dot.className = 'dot online';
            stText.innerText = 'Online';
            procesar(data);
        } catch (e) {
            dot.className = 'dot offline';
            stText.innerText = 'Offline';
            document.getElementById('last-update').innerText = "Error de conexión con n8n";
        }
    }

    function procesar(data) {
        const grouped = {};
        
        // Agrupar todo el historial por terminal
        data.forEach(item => {
            if (!grouped[item.terminal]) grouped[item.terminal] = { history: [] };
            grouped[item.terminal].history.push(item);
        });

        let tGen = 0, tM = 0, tS = 0, tT = 0, tG = 0;

        // Calcular los datos finales para el ranking y sumarizar
        const ranking = Object.keys(grouped).map(name => {
            // Ordenar el historial de más antiguo a más reciente
            const h = grouped[name].history.sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
            
            // Tomar el último registro disponible (Hoy) y el anterior (Ayer)
            const last = h[h.length - 1];
            const prev = h[h.length - 2];

            const curTotal = (last.soja || 0) + (last.maiz || 0) + (last.trigo || 0) + (last.girasol || 0);
            const preTotal = prev ? ((prev.soja || 0) + (prev.maiz || 0) + (prev.trigo || 0) + (prev.girasol || 0)) : 0;
            
            // Sumar al Acumulado General del país (Solo la última foto de cada puerto)
            tGen += curTotal;
            tM += (last.maiz || 0);
            tS += (last.soja || 0);
            tT += (last.trigo || 0);
            tG += (last.girasol || 0);

            const v = preTotal === 0 ? 0 : (((curTotal - preTotal) / preTotal) * 100).toFixed(1);

            return { 
                name, 
                cur: curTotal, 
                v, 
                hVal: h.map(x => (x.soja || 0) + (x.maiz || 0) + (x.trigo || 0) + (x.girasol || 0)), 
                hLab: h.map(x => x.fecha), 
                gps: GPS[name],
                // Guardamos el detalle del último día para mostrar en el mapa
                detail: { m: last.maiz || 0, s: last.soja || 0, t: last.trigo || 0, g: last.girasol || 0 }
            };
        }).sort((a, b) => b.cur - a.cur); // Ordenar de mayor a menor ingreso

        // Actualizar UI de Totales
        document.getElementById('total-gen').innerText = tGen.toLocaleString();
        document.getElementById('sum-maiz').innerText = tM.toLocaleString();
        document.getElementById('sum-soja').innerText = tS.toLocaleString();
        document.getElementById('sum-trigo').innerText = tT.toLocaleString();
        document.getElementById('sum-girasol').innerText = tG.toLocaleString();

        render(ranking);
    }

    function render(data) {
        const body = document.getElementById('ranking-body');
        body.innerHTML = '';
        document.getElementById('last-update').innerText = `Actualizado: ${new Date().toLocaleTimeString()}`;

        data.forEach(p => {
            if (!p.gps) return;
            const color = p.v >= 0 ? '#10b981' : '#ef4444';
            const m = L.circleMarker(p.gps, { radius: 9, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.8 }).addTo(map);
            
            // Estructura del Popup de Detalle de Cultivo
            const popupContent = `
                <div style="font-family: Inter, sans-serif; min-width: 160px;">
                    <strong style="color: #0f172a; font-size: 14px;">${p.name}</strong>
                    <div style="font-size: 20px; font-weight: 800; color: #2563eb; margin: 4px 0;">
                        ${p.cur} <span style="font-size: 12px; font-weight: 500; color: #64748b;">camiones</span>
                    </div>
                    <div class="popup-detail-grid">
                        <div><span>🌽 Maíz</span> <b>${p.detail.m}</b></div>
                        <div><span>🌱 Soja</span> <b>${p.detail.s}</b></div>
                        <div><span>🌾 Trigo</span> <b>${p.detail.t}</b></div>
                        <div><span>🌻 Gira.</span> <b>${p.detail.g}</b></div>
                    </div>
                </div>
            `;

            // Fila de la tabla
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b style="color:#334155">${p.name}</b></td>
                <td style="text-align:right; font-weight:700">${p.cur}</td>
                <td style="text-align:center"><span class="badge ${p.v >= 0 ? 'up' : 'down'}">${p.v >= 0 ? '▲' : '▼'} ${Math.abs(p.v)}%</span></td>
            `;

            // Acciones al hacer clic en la fila
            tr.onclick = () => {
                map.flyTo(p.gps, 12, { duration: 1.5 });
                m.bindPopup(popupContent).openPopup();
                chart(p.name, p.hVal, p.hLab);
            };
            body.appendChild(tr);
        });

        // Simular clic en el primero para llenar el gráfico al inicio
        if (data.length > 0) chart(data[0].name, data[0].hVal, data[0].hLab);
    }

    function chart(title, vals, labs) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labs,
                datasets: [{
                    label: 'Ingresos',
                    data: vals,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.05)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#3b82f6'
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    title: { display: true, text: title.toUpperCase(), align: 'start', font: { size: 12, weight: 'bold' }, color: '#64748b' }
                },
                scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: '#f1f5f9' } } }
            }
        });
    }

    // Inicializar carga manual
    fetchData();
</script>
</body>
</html>
