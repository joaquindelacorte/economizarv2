<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economiz.ar — Dashboard Económico</title>
    <meta name="description" content="Panel de indicadores económicos argentinos en tiempo real: dólar, inflación, BCRA, mercados y más.">
    <meta property="og:title" content="Economiz.ar">
    <meta property="og:description" content="Indicadores económicos argentinos en tiempo real.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0f172a">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ─── Reset & tokens ─────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-main:        #0f172a;
            --bg-card:        #1e293b;
            --bg-hover:       #334155;
            --sidebar-w:      260px;
            --header-h:       60px;

            --text-primary:   #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted:     #64748b;

            --accent:         #3b82f6;
            --accent-hover:   #2563eb;

            --border-color:   rgba(255,255,255,0.06);
            --transition:     0.25s ease;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Sidebar ────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100dvh;
            background: rgba(15, 23, 42, 0.98);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform var(--transition);
            z-index: 100;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Brand */
        .sidebar-brand {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff 30%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .brand-tagline {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Nav */
        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            overflow-y: auto;
        }

        .nav-group {
            margin-bottom: 20px;
        }

        .nav-group-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            padding: 0 10px;
            margin-bottom: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: background var(--transition), color var(--transition);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            min-height: 40px;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(59,130,246,0.12);
            color: var(--accent);
            font-weight: 600;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            border-radius: 0 2px 2px 0;
            background: var(--accent);
        }

        .nav-icon {
            font-size: 1rem;
            flex-shrink: 0;
            width: 20px;
            text-align: center;
        }

        .nav-badge {
            margin-left: auto;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            background: rgba(245,158,11,0.15);
            color: #f59e0b;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .footer-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* ─── Mobile Header ──────────────────────────────── */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: rgba(15,23,42,0.97);
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            z-index: 200;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border: none;
            background: none;
            border-radius: 6px;
            flex-shrink: 0;
            min-height: 44px;
            min-width: 44px;
            align-items: center;
            justify-content: center;
        }

        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: transform var(--transition), opacity var(--transition);
        }

        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .mobile-brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff 30%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ─── Overlay ────────────────────────────────────── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 90;
            opacity: 0;
            transition: opacity var(--transition);
        }

        .overlay.visible {
            opacity: 1;
        }

        /* ─── Content Area ───────────────────────────────── */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        /* Page loader */
        .page-loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .page-loader.active {
            opacity: 1;
            pointer-events: all;
        }

        .loader-ring {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* iframe */
        #content-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: 100dvh;
            display: block;
            background: var(--bg-main);
        }

        /* ─── Responsive: Tablet ─────────────────────────── */
        @media (max-width: 1024px) {
            :root { --sidebar-w: 230px; }
        }

        /* ─── Responsive: Mobile ─────────────────────────── */
        @media (max-width: 768px) {
            body { display: block; }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100dvh;
                transform: translateX(-100%);
                width: min(var(--sidebar-w), 85vw);
                box-shadow: 4px 0 24px rgba(0,0,0,0.4);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .overlay {
                display: block;
            }

            .mobile-header {
                display: flex;
            }

            .content-area {
                padding-top: var(--header-h);
                height: 100dvh;
            }

            #content-frame {
                height: calc(100dvh - var(--header-h));
            }
        }
    </style>
</head>
<body>

    <!-- Mobile Header -->
    <header class="mobile-header" role="banner">
        <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menú" aria-expanded="false" aria-controls="sidebar">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <span class="mobile-brand">Economiz.ar</span>
    </header>

    <!-- Backdrop Overlay (mobile) -->
    <div class="overlay" id="overlay" aria-hidden="true"></div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar" aria-label="Navegación principal">

        <div class="sidebar-brand">
            <div class="brand-logo">Economiz.ar</div>
            <div class="brand-tagline">Indicadores económicos · AR</div>
        </div>

        <div class="sidebar-nav">

            <div class="nav-group">
                <div class="nav-group-label">Economía</div>

                <button class="nav-item active" onclick="loadPage('finanzas.html', this)" aria-current="page">
                    <span class="nav-icon">💹</span>
                    Finanzas & BCRA
                </button>

                <button class="nav-item" onclick="loadPage('flujos.html', this)">
                    <span class="nav-icon">🔗</span>
                    Flujos Macro
                </button>

                <button class="nav-item" onclick="loadPage('dolar_bancos.html', this)">
                    <span class="nav-icon">🏦</span>
                    Dólar en Bancos
                </button>

                <button class="nav-item" onclick="loadPage('comex.html', this)">
                    <span class="nav-icon">🌐</span>
                    Comercio Exterior
                </button>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Energía</div>

                <button class="nav-item" onclick="loadPage('energia.html', this)">
                    <span class="nav-icon">⚡</span>
                    Electricidad
                </button>

                <button class="nav-item" onclick="loadPage('combustible.html', this)">
                    <span class="nav-icon">⛽</span>
                    Combustible
                </button>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Operativa</div>

                <button class="nav-item" onclick="loadPage('index.html', this)">
                    <span class="nav-icon">🚛</span>
                    Camiones
                </button>

                <button class="nav-item" onclick="loadPage('puertos4.html', this)">
                    <span class="nav-icon">🚢</span>
                    Puertos
                </button>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Herramientas</div>

                <button class="nav-item" onclick="loadPage('calculadora.html', this)">
                    <span class="nav-icon">🧮</span>
                    Calculadora
                </button>
            </div>

        </div>

        <footer class="sidebar-footer">
            <p class="footer-text">Economiz.ar &copy; 2025<br>Datos públicos &amp; APIs oficiales</p>
        </footer>

    </nav>

    <!-- Main Content -->
    <main class="content-area" id="main">
        <div class="page-loader" id="pageLoader" aria-live="polite" aria-label="Cargando página">
            <div class="loader-ring"></div>
        </div>
        <iframe
            id="content-frame"
            src="finanzas.html"
            title="Contenido principal"
            loading="lazy"
        ></iframe>
    </main>

    <script>
        const sidebar   = document.getElementById('sidebar');
        const overlay   = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        const frame     = document.getElementById('content-frame');
        const loader    = document.getElementById('pageLoader');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('visible');
            hamburger.classList.add('open');
            hamburger.setAttribute('aria-expanded', 'true');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('visible');
            hamburger.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
        }

        hamburger.addEventListener('click', () => {
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });

        overlay.addEventListener('click', closeSidebar);

        // Close sidebar on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sidebar.classList.contains('open')) closeSidebar();
        });

        function loadPage(url, el) {
            // Update active state
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active');
                i.removeAttribute('aria-current');
            });
            if (el) {
                el.classList.add('active');
                el.setAttribute('aria-current', 'page');
            }

            // Show loader
            loader.classList.add('active');

            // Load page
            frame.src = url;

            // Close mobile sidebar after selection
            if (window.innerWidth <= 768) closeSidebar();
        }

        frame.addEventListener('load', () => {
            loader.classList.remove('active');
        });
    </script>

</body>
</html>
